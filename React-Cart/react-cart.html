<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cart Component Using React</title>
        <style>
            :root {
                --bg: #f4f7fb;
                --surface: #ffffff;
                --border: #d6dee8;
                --text: #1f2937;
                --muted: #667085;
                --accent: #2563eb;
                --accent-soft: #eff6ff;
                --accent-dark: #1d4ed8;
                --success: #15803d;
                --summary: #f8fafc;
                --shadow: rgba(15, 23, 42, 0.08);
            }

            body[data-theme="dark"] {
                --bg: #0f172a;
                --surface: #111827;
                --border: #334155;
                --text: #e5eef9;
                --muted: #94a3b8;
                --accent: #60a5fa;
                --accent-soft: #1e293b;
                --accent-dark: #bfdbfe;
                --success: #4ade80;
                --summary: #0b1220;
                --shadow: rgba(2, 6, 23, 0.45);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                transition:
                    background-color 0.25s ease,
                    color 0.25s ease;
            }

            .page {
                max-width: 1000px;
                margin: 24px auto;
                padding: 0 16px;
            }

            .topbar {
                display: flex;
                justify-content: flex-end;
                margin-bottom: 12px;
            }

            .hero {
                margin-bottom: 20px;
            }

            .hero h1 {
                margin: 0 0 8px;
                font-size: 28px;
                color: var(--accent-dark);
            }

            .hero p {
                margin: 0;
                color: var(--muted);
            }

            .layout {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 20px;
            }

            .section {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 16px;
                box-shadow: 0 12px 28px var(--shadow);
            }

            .section h2 {
                margin: 0 0 16px;
                font-size: 20px;
                color: var(--accent-dark);
            }

            .product-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 12px;
            }

            .product-card,
            .cart-item,
            .summary-card {
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 12px;
                background: var(--summary);
            }

            .product-card h3,
            .cart-item h3 {
                margin: 0 0 8px;
                font-size: 16px;
            }

            .meta {
                margin: 0 0 10px;
                color: var(--muted);
            }

            .price {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 10px;
            }

            .button {
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 8px 12px;
                font-weight: 600;
                background: #eef2f7;
                color: var(--text);
                cursor: pointer;
                transition:
                    background-color 0.25s ease,
                    color 0.25s ease,
                    border-color 0.25s ease;
            }

            .button-primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }

            .button-secondary {
                margin-top: 12px;
                color: var(--accent-dark);
                background: var(--accent-soft);
            }

            .theme-toggle {
                background: var(--surface);
            }

            .cart-stack {
                display: grid;
                gap: 12px;
            }

            .cart-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }

            .qty-controls {
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }

            .qty-controls button {
                width: 30px;
                height: 30px;
                border: 1px solid var(--border);
                background: var(--accent-soft);
                color: var(--accent-dark);
                border-radius: 4px;
                cursor: pointer;
            }

            .qty-controls input {
                width: 48px;
                border: 1px solid var(--border);
                border-radius: 4px;
                text-align: center;
                padding: 6px;
            }

            .summary-line {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                margin: 8px 0;
            }

            .summary-total {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                margin-top: 12px;
                padding-top: 12px;
                border-top: 1px solid var(--border);
                font-weight: 700;
                color: var(--accent-dark);
            }

            .sync-text {
                margin-top: 12px;
                color: var(--success);
            }

            .empty-state {
                margin: 0;
                color: var(--muted);
            }

            @media (max-width: 900px) {
                .layout {
                    grid-template-columns: 1fr;
                }

                .cart-row {
                    align-items: flex-start;
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.development.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
        ></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script type="text/babel" src="react-cart.js"></script>
    </body>
</html>
